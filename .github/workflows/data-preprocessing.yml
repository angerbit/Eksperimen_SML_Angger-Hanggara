name: Data Preprocessing Pipeline

on:
  # Trigger workflow on push to main branch
  push:
    branches: [ main, develop ]
    paths:
      - 'Membangun_model/data_preparation.ipynb'
      - 'Membangun_model/Churn_preprocessing/**'
      - 'automate_Angger-Hanggara.py'
      - 'test_preprocessing.py'
      - 'requirements.txt'
      - '.github/workflows/data-preprocessing.yml'
  
  # Run on schedule (every Sunday at 2 AM UTC)
  schedule:
    - cron: '0 2 * * 0'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  data-preprocessing:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.9', '3.12']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run automated preprocessing tests
      run: |
        python test_preprocessing.py
    
    - name: Run automated preprocessing pipeline
      run: |
        python automate_Angger-Hanggara.py
    
    - name: Upload preprocessed features
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: preprocessed-features-py${{ matrix.python-version }}
        path: Membangun_model/X_preprocessed.csv
        retention-days: 30
    
    - name: Upload preprocessed target
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: preprocessed-target-py${{ matrix.python-version }}
        path: Membangun_model/y_preprocessed.csv
        retention-days: 30
    
    - name: Validate preprocessing results
      if: always()
      run: |
        python -c "
        import pandas as pd
        import os
        
        # Check preprocessed output files
        X_path = 'Membangun_model/X_preprocessed.csv'
        y_path = 'Membangun_model/y_preprocessed.csv'
        
        if os.path.exists(X_path) and os.path.exists(y_path):
            X = pd.read_csv(X_path)
            y = pd.read_csv(y_path)
            print('✓ Preprocessed data files exist')
            print(f'  Features shape: {X.shape}')
            print(f'  Target shape: {y.shape}')
            print(f'  Features columns: {list(X.columns[:10])}...')
        else:
            print('✗ Preprocessed data files not found')
            if not os.path.exists(X_path):
                print(f'  Missing: {X_path}')
            if not os.path.exists(y_path):
                print(f'  Missing: {y_path}')
            exit(1)
        "
    
    - name: Post workflow summary
      if: always()
      run: |
        echo "## Data Preprocessing Workflow Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Execution Details" >> $GITHUB_STEP_SUMMARY
        echo "- **Python Version**: ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Pipeline Type**: Automated Python Script" >> $GITHUB_STEP_SUMMARY
        echo "- **Script**: automate_Angger-Hanggara.py" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Output Files" >> $GITHUB_STEP_SUMMARY
        echo "- **X_preprocessed.csv**: Features ready for training" >> $GITHUB_STEP_SUMMARY
        echo "- **y_preprocessed.csv**: Target variable" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Processing Steps" >> $GITHUB_STEP_SUMMARY
        echo "1. Load data from CSV" >> $GITHUB_STEP_SUMMARY
        echo "2. Data wrangling (check missing values, duplicates)" >> $GITHUB_STEP_SUMMARY
        echo "3. Drop unnecessary columns (RowNumber, CustomerId, Surname)" >> $GITHUB_STEP_SUMMARY
        echo "4. Define features and target" >> $GITHUB_STEP_SUMMARY
        echo "5. Encode categorical variables (Geography, Gender)" >> $GITHUB_STEP_SUMMARY
        echo "6. Scale numerical features (StandardScaler)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✅ **Status**: Success" >> $GITHUB_STEP_SUMMARY
